name: Sync trade-in prices

on:
  schedule:
    - cron: "30 5 * * *"
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Sync market prices and ingest
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          SCRAPER_API_KEY: ${{ secrets.SCRAPER_API_KEY }}
          SITE_URL: https://www.voisintech.fr
          SYNC_LIMIT: "15"
        run: npx tsx scripts/sync-trade-in-market.ts
